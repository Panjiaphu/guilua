{% extends "base.html" %}
{% block content %}
<section class="tool-shell panel">
  <div>
    <h1>{{ t("shortlink.title") }}</h1>
    <p class="muted">{{ t("shortlink.subtitle") }}</p>
  </div>
  <form class="stack-form" method="post">
    <input name="target_url" type="url" required placeholder="https://example.com" value="{{ target_url or '' }}">
    <button class="button" type="submit">{{ t("shortlink.create") }}</button>
  </form>
  {% if error %}<div class="notice-panel danger">{{ error }}</div>{% endif %}
  {% if short_url %}
    <div class="result-box">
      <span>{{ t("shortlink.result") }}</span>
      <strong>{{ short_url }}</strong>
      <a class="button small" href="{{ short_url }}" target="_blank" rel="noopener noreferrer">{{ t("shortlink.open") }}</a>
    </div>
  {% endif %}
</section>
{% endblock %}
