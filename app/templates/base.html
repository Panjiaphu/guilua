<!doctype html>
<html lang="{{ locale }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ settings.app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/?lang={{ locale }}">Guilua</a>
      <nav class="nav">
        <a href="/member?lang={{ locale }}">{{ t("nav.member") }}</a>
        <a href="/admin?lang={{ locale }}">{{ t("nav.admin") }}</a>
        <a href="/?lang=vi">VI</a>
        <a href="/?lang=zh-TW">中文</a>
      </nav>
      <div class="auth-actions">
        {% if user or admin %}
          <form method="post" action="/logout">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button class="button ghost" type="submit">{{ t("nav.logout") }}</button>
          </form>
        {% else %}
          <a class="button ghost" href="/login?lang={{ locale }}">{{ t("nav.login") }}</a>
        {% endif %}
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
