{% extends "base.html" %}
{% block content %}
<section class="auth-card">
  <h1>{{ t("auth.register") }}</h1>
  <p class="muted">{{ t("auth.register_hint") }}</p>
  {% if error %}<p class="alert">{{ error }}</p>{% endif %}
  <form method="post" action="/register" class="form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>{{ t("auth.full_name") }}<input type="text" name="full_name" required autocomplete="name"></label>
    <label>{{ t("auth.email") }}<input type="email" name="email" required autocomplete="email"></label>
    <label>{{ t("auth.password") }}<input type="password" name="password" minlength="10" required autocomplete="new-password"></label>
    <label>{{ t("auth.language") }}
      <select name="locale">
        <option value="vi">Tiếng Việt</option>
        <option value="zh-TW">繁體中文</option>
      </select>
    </label>
    <p class="form-help">{{ t("auth.password_rule") }}</p>
    <button class="button primary" type="submit">{{ t("auth.register") }}</button>
  </form>
</section>
{% endblock %}
