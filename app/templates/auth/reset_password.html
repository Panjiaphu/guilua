{% extends "base.html" %}
{% block content %}
<section class="auth-card">
  <h1>{{ t("auth.reset_title") }}</h1>
  <p class="muted">{{ t("auth.reset_hint") }}</p>
  {% if error %}<p class="alert">{{ error }}</p>{% endif %}
  <form method="post" action="/reset-password" class="form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="token" value="{{ token }}">
    <label>{{ t("auth.new_password") }}<input type="password" name="password" minlength="10" required autocomplete="new-password"></label>
    <p class="form-help">{{ t("auth.password_rule") }}</p>
    <button class="button primary" type="submit">{{ t("auth.reset_submit") }}</button>
  </form>
</section>
{% endblock %}
