{% extends "base.html" %}
{% block content %}
<section class="auth-card">
  <h1>{{ t("auth.forgot_title") }}</h1>
  <p class="muted">{{ t("auth.forgot_hint") }}</p>
  {% if sent %}<p class="success">{{ t("auth.forgot_sent") }}</p>{% endif %}
  {% if error %}<p class="alert">{{ error }}</p>{% endif %}
  <form method="post" action="/forgot-password" class="form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>{{ t("auth.email") }}<input type="email" name="email" required autocomplete="email"></label>
    <button class="button primary" type="submit">{{ t("auth.forgot_submit") }}</button>
  </form>
  <a class="button ghost full" href="/login?lang={{ locale }}">{{ t("auth.login") }}</a>
</section>
{% endblock %}
