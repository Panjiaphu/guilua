{% extends "base.html" %}
{% block content %}
<section class="auth-card">
  <h1>{{ t("auth.login") }}</h1>
  {% if error %}<p class="alert">{{ error }}</p>{% endif %}
  <form method="post" action="/login" class="form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>{{ t("auth.email") }}<input type="email" name="email" required autocomplete="email"></label>
    <label>{{ t("auth.password") }}<input type="password" name="password" required autocomplete="current-password"></label>
    <button class="button primary" type="submit">{{ t("auth.login") }}</button>
  </form>
  <p><a href="/register?lang={{ locale }}">{{ t("auth.register") }}</a></p>
</section>
{% endblock %}
