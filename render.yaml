services:
  - type: web
    name: guilua
    runtime: python
    plan: standard
    buildCommand: bash scripts/build_render.sh
    startCommand: bash scripts/start_render.sh
    healthCheckPath: /healthz/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: DEBUG
        value: false
      - key: APP_ENV
        value: production
      - key: USE_SQLITE
        value: true
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: RUN_MIGRATIONS_DURING_BUILD
        value: false
      - key: ADMIN_NOTIFICATION_EMAIL
        value: panjiaphu@gmail.com
      - key: ADMIN_LINE_ID
        value: "@827sxbki"
      - key: ADMIN_PHONE
        value: "0906938893"
      - key: ADMIN_SEED_EMAIL
        value: panjiaphu@gmail.com
      - key: MEMBER_REGISTRATION_ENABLED
        value: false
      - key: MEMBER_PORTAL_ENABLED
        value: false
      - key: CRYPTO_MARKET_LIVE_ENABLED
        value: true
      - key: CRYPTO_MARKET_CACHE_SECONDS
        value: 180
      - key: CRYPTO_MARKET_TIMEOUT_SECONDS
        value: 2.5
      - key: COINGECKO_API_URL
        value: https://api.coingecko.com/api/v3/simple/price
      - key: BINANCE_API_URL
        value: https://api.binance.com/api/v3/ticker/24hr
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_USE_TLS
        value: true
      - key: EMAIL_WEBHOOK_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: GOOGLE_ADSENSE_CLIENT
        sync: false
      - key: GOOGLE_ADSENSE_SLOT
        sync: false
      - key: GOOGLE_ADSENSE_PUBLISHER_ID
        sync: false
      - key: EXCHANGE_RATE_PROVIDER_URL
        sync: false
      - key: IP_SERVICE_PROVIDER_URL
        sync: false
      - key: IP_SERVICE_PROVIDER_API_KEY
        sync: false
      - key: IP_SERVICE_PROVIDER_TIMEOUT_SECONDS
        value: 5
