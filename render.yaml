services:
  - type: web
    name: guilua
    runtime: python
    plan: standard
    buildCommand: bash scripts/build_render.sh
    startCommand: bash scripts/start_render.sh
    healthCheckPath: /healthz/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: DEBUG
        value: false
      - key: APP_ENV
        value: production
      - key: USE_SQLITE
        value: true
      - key: SESSION_COOKIE_SECURE
