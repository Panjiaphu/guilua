        value: false
      - key: ADMIN_NOTIFICATION_EMAIL
        value: panjiaphu@gmail.com
      - key: ADMIN_LINE_ID
        value: "@827sxbki"
      - key: ADMIN_PHONE
        value: "0906938893"
      - key: ADMIN_SEED_EMAIL
        value: panjiaphu@gmail.com
      - key: MEMBER_REGISTRATION_ENABLED
        value: true
      - key: MEMBER_PORTAL_ENABLED
        value: true
      - key: AI_AGENT_API_ENABLED
        value: true
