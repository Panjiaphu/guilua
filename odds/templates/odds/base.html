{% load static %}
<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GuiLua Odds</title>
  <link rel="stylesheet" href="{% static 'odds/app.css' %}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{% url 'odds:import' %}">GuiLua Odds</a>
    <nav class="nav">
      <a href="{% url 'odds:import' %}">Import ty le</a>
      <a href="{% url 'odds:tickets' %}">Nhap ve</a>
      <a href="{% url 'odds:summary' %}">Tong ket</a>
    </nav>
  </header>

  <main class="shell">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
